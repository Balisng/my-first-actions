<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Simple To-Do List</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Anuphan:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body>

    <div class="container">
        <h2>📝 รายการที่ต้องทำวันนี้</h2>
        
        <div class="input-section">
            <input type="text" id="todo-input" placeholder="เพิ่มกิจกรรมใหม่ของคุณ..." autocomplete="off">
            <button id="add-btn">เพิ่ม</button>
        </div>

        <ul id="todo-list">
            </ul>
    </div>

    <script src="script.js"></script>
</body>
</html>
